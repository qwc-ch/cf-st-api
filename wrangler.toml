# wrangler.toml
name = 'cf-st-api'
main = ".svelte-kit/cloudflare/_worker.js"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

# routes:
# - /api/*  -> this Worker (SvelteKit backend)
# Frontend static files should be deployed to Cloudflare Pages
# with a redirect rule: /api/* https://sillytavern-api.workers.dev/* 200

[[d1_databases]]
binding = "DB"
database_name = "sillytavern-db"
database_id = "1208a6f1-e65a-4e5d-84b7-50fcdd1497fe"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "ASSETS_BUCKET"
bucket_name = "sillytavern-assets"

[assets]
directory = ".svelte-kit/output/client"
binding = "ASSETS"

[vars]
PUBLIC_R2_URL = ""  # Optional: set to R2 public URL for direct image access
